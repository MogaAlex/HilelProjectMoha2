services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
        sh -c "uvicorn e_commerce2.asgi:application --reload --hosts 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${PG_NAME}
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    ports:
      - "5432-5432"

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
