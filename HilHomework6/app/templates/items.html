{% extends "base.html" %}

{% block title %}Магазин{% endblock %}

{% block content %}
<h2> Каталог магазина </h2>
<table>

    <tr bordermargin >
        <thead>
        <th> Книга</th>
        <th> Автор</th>
        <th> Цена</th>
        </thead>
    </tr>

        {% for product in products %}
    <tr>
        <td>{{ product.name }}</td>
        <td>{{ product.autor }}</td>
        <td style="text-align: center;">{{ product.price }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
