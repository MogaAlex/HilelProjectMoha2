version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_NAME}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    networks:
      - backend

  # ======================
  # PROJECT A (SHOP)
  # ======================
  shop:
    build: ./project_A
    command: gunicorn project_one.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./project_A:/app
    env_file:
      - ./project_A/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    networks:
      - backend

  shop_celery:
    build: ./project_A
    command: celery -A project_one worker -l info
    volumes:
      - ./project_A:/app
    env_file:
      - ./project_A/.env
    depends_on:
      - redis
      - db
    networks:
      - backend

  # ======================
  # PROJECT B (PAYMENTS)
  # ======================
  payments:
    build: ./project_B
    command: gunicorn project_two.wsgi:application --bind 0.0.0.0:8001
    volumes:
      - ./project_B:/app
    env_file:
      - ./project_B/.env
    depends_on:
      - db
      - redis
    ports:
      - "8001:8001"
    networks:
      - backend

  payments_celery:
    build: ./project_B
    command: celery -A project_two worker -l info
    volumes:
      - ./project_B:/app
    env_file:
      - ./project_B/.env
    depends_on:
      - redis
      - db
    networks:
      - backend

networks:
  backend:

volumes:
  kanchi-data:

